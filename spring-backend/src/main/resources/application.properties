spring.application.name=budgetbrain
server.port=${PORT:8080}
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:budgetbrain}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
server.tomcat.max-swallow-size=6MB
server.error.include-message=never
app.jwt.secret=${JWT_SECRET:development-only-secret-change-before-production-1234567890}
app.client.origin=${CLIENT_ORIGIN:http://localhost:5173}
app.ocr.url=${PADDLEOCR_API_URL:}
app.ocr.key=${PADDLEOCR_API_KEY:}
